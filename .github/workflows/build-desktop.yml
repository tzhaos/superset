name: Build Desktop App

on:
  workflow_call:
    inputs:
      channel:
        description: "Release channel (stable or canary)"
        required: true
        type: string
      version_suffix:
        description: "Version suffix to append (e.g., -canary). Empty for stable."
        required: false
        type: string
        default: ""
      electron_builder_config:
        description: "Electron builder config file"
        required: false
        type: string
        default: "electron-builder.ts"
      artifact_prefix:
        description: "Prefix for artifact names"
        required: false
        type: string
        default: "desktop"
      artifact_retention_days:
        description: "Number of days to retain artifacts"
        required: false
        type: number
        default: 30

jobs:
  build-windows:
    name: Build - Windows (x64)
    runs-on: windows-latest

    steps:
      - name: Enable Git long paths
        run: git config --system core.longpaths true
        shell: powershell

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        id: setup-bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ steps.setup-bun.outputs.bun-revision }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ steps.setup-bun.outputs.bun-revision }}-

      - name: Install dependencies
        run: bun install --frozen --ignore-scripts

      - name: Install desktop native dependencies
        working-directory: apps/desktop
        run: bun run install:deps

      - name: Set version suffix
        if: inputs.version_suffix != ''
        working-directory: apps/desktop
        run: |
          $CURRENT_VERSION = (Get-Content package.json | ConvertFrom-Json).version
          $NEW_VERSION = "${CURRENT_VERSION}${{ inputs.version_suffix }}"
          Write-Host "Setting version to: $NEW_VERSION"
          $pkg = Get-Content package.json | ConvertFrom-Json
          $pkg.version = $NEW_VERSION
          $pkg | ConvertTo-Json -Depth 100 | Set-Content package.json
          Write-Host "Updated package.json version to $NEW_VERSION"
        shell: pwsh

      - name: Build Electron app
        working-directory: apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          TARGET_ARCH: x64
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          NEXT_PUBLIC_WEB_URL: ${{ secrets.NEXT_PUBLIC_WEB_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_DOCS_URL: ${{ secrets.NEXT_PUBLIC_DOCS_URL }}
          NEXT_PUBLIC_STREAMS_URL: ${{ secrets.NEXT_PUBLIC_STREAMS_URL }}
          NEXT_PUBLIC_ELECTRIC_URL: ${{ secrets.NEXT_PUBLIC_ELECTRIC_URL }}
          SENTRY_DSN_DESKTOP: ${{ secrets.SENTRY_DSN_DESKTOP }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          RELAY_URL: ${{ secrets.RELAY_URL }}
          SUPERSET_WORKSPACE_NAME: superset
        run: bun run build

      - name: Verify Windows artifacts exist
        working-directory: apps/desktop
        run: |
          Get-ChildItem -Path release
          if (-not (Test-Path release/*.exe)) {
            Write-Error "No .exe artifact generated in apps/desktop/release"
            exit 1
          }
          if (-not (Test-Path release/*.msi)) {
            Write-Error "No .msi artifact generated in apps/desktop/release"
            exit 1
          }
          if (-not (Test-Path release/latest.yml)) {
            Write-Error "No Windows auto-update manifest generated in apps/desktop/release"
            exit 1
          }
        shell: pwsh

      - name: Upload Windows EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-windows-exe
          path: apps/desktop/release/*.exe
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error

      - name: Upload Windows MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-windows-msi
          path: apps/desktop/release/*.msi
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error

      - name: Upload Windows blockmap + manifest
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-windows-update-manifest
          path: |
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest.yml
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error
